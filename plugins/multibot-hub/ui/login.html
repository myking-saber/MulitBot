<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#1a1a2e">
<title>MulitBot Hub - Login</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #e0e0e0; font-family: -apple-system, system-ui, sans-serif;
  display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.login-box { background: #16213e; padding: 2rem; border-radius: 12px; width: 90%; max-width: 360px; }
h1 { font-size: 1.5rem; margin-bottom: 1.5rem; text-align: center; }
input { width: 100%; padding: 12px; border: 1px solid #334; border-radius: 8px;
  background: #0f3460; color: #fff; font-size: 16px; margin-bottom: 1rem; }
input:focus { outline: none; border-color: #e94560; }
button { width: 100%; padding: 12px; border: none; border-radius: 8px;
  background: #e94560; color: #fff; font-size: 16px; cursor: pointer; }
button:active { background: #c73650; }
.error { color: #e94560; font-size: 14px; margin-bottom: 1rem; display: none; }
</style>
</head>
<body>
<div class="login-box">
  <h1>MulitBot Hub</h1>
  <p class="error" id="error">Invalid password</p>
  <input id="secret" type="password" placeholder="Enter hub secret..." autofocus>
  <button onclick="login()">Enter</button>
</div>
<script>
function login() {
  const secret = document.getElementById('secret').value.trim();
  if (!secret) return;
  // Redirect with secret as query param — server sets HttpOnly cookie
  window.location.href = '/?secret=' + encodeURIComponent(secret);
}
document.getElementById('secret').addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});
</script>
</body>
</html>
